[tool.poetry]
name = "pos-system"
version = "0.1.0"
description = "Multi-sucursal POS con Facturación Electrónica DIAN"
authors = ["Johan"]
readme = "README.md"

[tool.poetry.dependencies]
python = "^3.11"
fastapi = "^0.115.0"
uvicorn = {extras = ["standard"], version = "^0.30.6"}
sqlalchemy = {extras = ["asyncio"], version = "^2.0.35"}
alembic = "^1.13.2"
asyncpg = "^0.29.0"
pydantic = "^2.9.2"
pydantic-settings = "^2.5.2"
python-jose = {extras = ["cryptography"], version = "^3.3.0"}
passlib = {extras = ["bcrypt"], version = "^1.7.4"}
python-multipart = "^0.0.9"
redis = "^5.0.8"
celery = "^5.4.0"
httpx = "^0.27.2"
lxml = "^5.2.2"
signxml = "^4.5.1"
python-escpos = "^3.1.0"
pywebpush = "^2.3.0"
cryptography = "^49.0.0"
pyotp = "^2.10.0"
qrcode = {extras = ["pil"], version = "^8.2"}
pillow = "^10.4.0"
python-dotenv = "^1.0.1"
structlog = "^24.1.0"
tenacity = "^8.3.0"

[tool.poetry.group.dev.dependencies]
pytest = "^8.3.3"
pytest-asyncio = "^0.23.7"
pytest-cov = "^5.0.0"
factory-boy = "^3.3.0"
faker = "^25.1.0"
ruff = "^0.6.5"
mypy = "^1.11.2"
pre-commit = "^3.8.0"

[build-system]
requires = ["poetry-core"]
build-backend = "poetry.core.masonry.api"
